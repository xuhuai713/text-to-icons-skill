<title>图标集</title>
<style>
/* ═══ Reset + Base ═══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.5; }

/* ═══ Layout ═══ */
.max-w-6xl { max-width: 72rem; }
.mx-auto { margin-left: auto; margin-right: auto; }
.px-4 { padding-left: 1rem; padding-right: 1rem; }
.py-8 { padding-top: 2rem; padding-bottom: 2rem; }

/* ═══ Typography ═══ */
.text-center { text-align: center; }
.text-2xl { font-size: 1.5rem; line-height: 2rem; }
.text-lg { font-size: 1.125rem; line-height: 1.75rem; }
.text-xs { font-size: 0.75rem; line-height: 1rem; }
.font-bold { font-weight: 700; }
.font-semibold { font-weight: 600; }
.text-slate-500 { color: #64748b; }
.text-slate-600 { color: #475569; }
.text-slate-800 { color: #1e293b; }

/* ═══ Flex ═══ */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }

/* ═══ Grid ═══ */
.grid { display: grid; }
.grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
@media (min-width: 640px) { .sm\:grid-cols-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); } }

/* ═══ Spacing ═══ */
.mb-4 { margin-bottom: 1rem; }
.mb-8 { margin-bottom: 2rem; }
.mb-10 { margin-bottom: 2.5rem; }
.mt-1 { margin-top: 0.25rem; }
.p-4 { padding: 1rem; }
.px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
.py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }

/* ═══ Border & Background ═══ */
.border { border: 1px solid; }
.border-slate-200 { border-color: #e2e8f0; }
.border-slate-300 { border-color: #cbd5e1; }
.rounded-md { border-radius: 0.375rem; }
.rounded-xl { border-radius: 0.75rem; }
.bg-white { background: #ffffff; }

/* ═══ Components ═══ */
.icon-card { transition: all 0.2s ease; }
.icon-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
.copy-btn { transition: all 0.2s ease; }
.copy-btn:hover { background: #e2e8f0; }
.copy-btn.copied { background: #dcfce7; color: #16a34a; border-color: #86efac; }
.source-badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: #f1f5f9; color: #64748b; }
.step-badge { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: white; background: linear-gradient(135deg, #6366f1, #8b5cf6); }
</style>
</head>

// ══════════════════════════════════════════════════════════
// 渲染引擎 + 复制功能 —— 无需修改
// ══════════════════════════════════════════════════════════

function buildSvgTag(paths) {
  return '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="' + ICON_COLOR + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' + paths + '</svg>';
}

function renderIcons() {
  document.getElementById('page-title').textContent = PAGE_TITLE;
  var container = document.getElementById('icon-groups');
  var html = '';
  for (var g = 0; g < ICON_GROUPS.length; g++) {
    var group = ICON_GROUPS[g];
    html += '<div class="mb-10"><div class="flex items-center gap-3 mb-4"><div class="step-badge">' + (g + 1) + '</div><h2 class="text-lg font-semibold text-slate-800">' + group.name + '</h2></div><div class="grid grid-cols-3 sm:grid-cols-6 gap-3">';
    for (var i = 0; i < group.icons.length; i++) {
      var icon = group.icons[i];
      html += '<div class="icon-card bg-white rounded-xl p-4 border border-slate-200 flex flex-col items-center gap-2">' + buildSvgTag(icon.paths) + '<span class="source-badge">' + icon.source + '</span><button class="copy-btn text-xs px-3 py-1 rounded-md border border-slate-300 text-slate-600" onclick="copySVG(this)">复制 SVG</button></div>';
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

renderIcons();

function copySVG(btn) {
  const card = btn.parentElement;
  const viewSvg = card.querySelector('svg[width="40"]');
  if (!viewSvg) return;
  const strokeColor = viewSvg.getAttribute('stroke') || ICON_COLOR;
  const viewBox = viewSvg.getAttribute('viewBox') || '0 0 24 24';
  const paths = viewSvg.innerHTML.trim();
  const svgCode = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + viewBox + '" width="24pt" height="24pt" fill="none" stroke="' + strokeColor + '" stroke-width="' + COPY_STROKE_WIDTH + '" stroke-linecap="round" stroke-linejoin="round">' + paths + '</svg>';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(svgCode).then(function() { showCopied(btn); }).catch(function() { fallbackCopy(svgCode, btn); });
  } else { fallbackCopy(svgCode, btn); }
}

function fallbackCopy(text, btn) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showCopied(btn); } catch(e) {}
  document.body.removeChild(ta);
}

function showCopied(btn) {
  btn.classList.add('copied');
  var orig = btn.textContent;
  btn.textContent = '已复制!';
  setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
}
</script>
